---
- name: Formulating Hosted Control Plane Namespace
  ansible.builtin.set_fact:
    hosted_control_plane_namespace: "{{ hcp.control_plane.clusters_namespace }}-{{ hcp.control_plane.hosted_cluster_name }}"

- name: Check if SSH key already exists
  ansible.builtin.stat:
    path: "~/.ssh/{{ hcp.ansible_key_name }}"
  register: ssh_key_stat

- name: Generate SSH key if not present
  ansible.builtin.command:
    cmd: ssh-keygen -t rsa -b 4096 -N "" -f ~/.ssh/{{ hcp.ansible_key_name }}
  when: not ssh_key_stat.stat.exists

- name: Get ssh key
  ansible.builtin.shell:
    cmd: cat ~/.ssh/{{ hcp.ansible_key_name }}.pub
  register: ssh_output

- name: Load ssh_key into a variable
  ansible.builtin.set_fact:
    ssh_key: "{{ ssh_output.stdout_lines[0] }}"

- name: Get pod name for hcp-cli-download
  ansible.builtin.shell:
    cmd: >
      oc get pod -n {{ hcp.mce.mce_namespace }}
      -l app=hcp-cli-download
      --no-headers -o custom-columns=NAME:.metadata.name
  register: hcp_pod_name
  changed_when: false

- name: Try copying hcp-linux-s390x.tar.gz directly from pod (newer MCE layout)
  ansible.builtin.command:
    cmd: >
      oc cp {{ hcp.mce.mce_namespace }}/{{ hcp_pod_name.stdout | trim }}:/opt/app-root/src/hcp-linux-s390x.tar.gz
      /root/ansible_workdir/hcp.tar.gz
  register: hcp_cp_direct
  failed_when: false
  changed_when: hcp_cp_direct.rc == 0

- name: Fall back to copying from s390x directory (older MCE layout)
  ansible.builtin.command:
    cmd: >
      oc cp {{ hcp.mce.mce_namespace }}/{{ hcp_pod_name.stdout | trim }}:/opt/app-root/src/linux/s390x/
      /root/ansible_workdir
  when: hcp_cp_direct.rc != 0

- name: Extract binary from hcp.tar.gz
  ansible.builtin.unarchive:
    src: /root/ansible_workdir/hcp.tar.gz
    dest: /usr/local/bin/
    remote_src: true

- name: Get ICSP for Hosted Control Plane
  ansible.builtin.template:
    src: icsp.yaml.j2
    dest: /root/ansible_workdir/icsp.yaml
    mode: '0644'

- name: Create pull secret file for Hosted Cluster
  ansible.builtin.copy:
    content: "{{ hcp.control_plane.pull_secret }}"
    dest: /root/ansible_workdir/auth_file
    mode: '0600'

- name: Write mirror registry CA certificate for HCP trust bundle
  ansible.builtin.copy:
    content: "{{ disconnected.registry.ca_cert }}"
    dest: /root/ansible_workdir/mirror-registry-ca.crt
    mode: '0600'
  when: disconnected is defined and disconnected.enabled | default(false)

- name: Create a Hosted Cluster
  ansible.builtin.command:
    cmd: >
      hcp create cluster kubevirt
      --name={{ hcp.control_plane.hosted_cluster_name }}
      --node-pool-replicas={{ hcp.data_plane.compute_count }}
      --arch={{ hcp.control_plane.arch }}
      --pull-secret=/root/ansible_workdir/auth_file
      --namespace={{ hcp.control_plane.clusters_namespace }}
      --base-domain={{ hcp.control_plane.basedomain }}
      --ssh-key ~/.ssh/{{ hcp.ansible_key_name }}.pub
      {% if hcp.control_plane.high_availability == false %}
      --control-plane-availability-policy "SingleReplica"
      {% endif %}
      --infra-availability-policy "SingleReplica"
      --image-content-sources /root/ansible_workdir/icsp.yaml
      {% if disconnected is defined and disconnected.enabled | default(false) %}
      --release-image={{ disconnected.registry.url }}/openshift/release-images:{{ hcp.control_plane.ocp_release_image }}
      --additional-trust-bundle /root/ansible_workdir/mirror-registry-ca.crt
      --olm-disable-default-sources
      {% else %}
      {% set release_image = lookup('env', 'HCP_RELEASE_IMAGE') %}
      {% if release_image is defined and release_image != '' %}
      --release-image={{ release_image }}
      {% else %}
      --release-image=quay.io/openshift-release-dev/ocp-release:{{ hcp.control_plane.ocp_release_image }}
      {% endif %}
      {% endif %}
      {% if hcp.control_plane.additional_flags is defined and hcp.control_plane.additional_flags != '' %}
      {{ hcp.control_plane.additional_flags }}
      {% endif %}
      --memory={{ hcp.data_plane.memory }}
      --cores={{ hcp.data_plane.cores }}
      --root-volume-size={{ hcp.data_plane.root_volume_size }}

- name: Waiting for Hosted Control Plane to be available
  ansible.builtin.command:
    cmd: >
      oc wait --timeout=30m
      --for=condition=Available
      --namespace={{ hcp.control_plane.clusters_namespace }} hostedcluster/{{ hcp.control_plane.hosted_cluster_name }}

- name: Wait for pods to come up in Hosted Control Plane Namespace
  ansible.builtin.shell: |
    set -o pipefail
    oc get pods -n {{ hosted_control_plane_namespace }} \
    | wc -l
  register: pod_count
  changed_when: false
  until: pod_count.stdout | int > 20
  retries: 40
  delay: 10

- name: Wait for all pods to be in Running State in  Hosted Control Plane Namespace
  ansible.builtin.shell: |
    set -o pipefail
    oc get pods -n {{ hosted_control_plane_namespace }} --no-headers \
    | awk '$3 != "Running" && $3 != "Completed" {count++} END {print count+0}'
  register: pod_status
  changed_when: false
  until: pod_status.stdout | int == 0
  retries: 40
  delay: 10
