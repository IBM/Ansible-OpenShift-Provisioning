---
- name: Print the list of packages to be installed and updated.
  tags: install_packages
  debug:
    var: packages

- name: Installing required packages for Linux machines.
  tags: install_packages
  become: true
  ansible.builtin.package:
    name: "{{ item }}"
    state: latest
    update_cache: yes
  loop: "{{ packages }}"
  when: ansible_os_family != 'Darwin'

- name:  Install tessia baselib
  import_role:
    name: install_tessia_baselib
  when: env.bastion.installation_type == "lpar"

- name: Installing required packages for Mac machines.
  tags: install_packages
  become: false
  community.general.homebrew:
    name: "{{ item }}"
    state: latest
  loop: "{{ packages }}"
  when: ansible_os_family == 'Darwin'
