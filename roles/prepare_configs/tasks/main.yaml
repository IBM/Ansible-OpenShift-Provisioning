---
- name: Delete OCP Work Directory For Idempotency.
  file:
    path: ~/ansible_workdir
    state: absent

- name: Create Work Directory
  file:
    path: ~/ansible_workdir
    state: directory

- name: Prepare Agent Config
  ansible.builtin.template:
    src: agent-config.yaml.j2
    dest: "{{ item }}"
    owner: root
    group: root
    mode: "0755"
    backup: yes
  loop:
    - ~/ansible_workdir/agent-config.yaml
    - ~/ansible_workdir/agent-config-backup.yaml

- name: Check if bastion SSH key exists
  stat:
    path: "/root/.ssh/id_rsa.pub"
  register: ssh_key_check

- name: Generate bastion SSH key if not exists
  command: ssh-keygen -t rsa -b 4096 -N "" -f "/root/.ssh/id_rsa" -C "OpenShift key"
  when: ssh_key_check.stat.exists == false

- name: Read bastion SSH Key
  command: cat /root/.ssh/id_rsa.pub
  register: ssh_key

- name: Prepare Install Config
  vars:
    ssh_key: ssh_key
  ansible.builtin.template:
    src: install-config.yaml.j2
    dest: "{{ item }}"
    owner: root
    group: root
    mode: "0755"
    backup: yes
  loop:
    - ~/ansible_workdir/install-config.yaml
    - ~/ansible_workdir/install-config-backup.yaml
