---
- name: Set MetalLB role variables
  ansible.builtin.set_fact:
    metallb_cfg: "{{ hcp.metallb | default({}) }}"
    metallb_namespace: "{{ (hcp.metallb | default({})).namespace | default('metallb-system') }}"
    metallb_operator_name: "{{ (hcp.metallb | default({})).operator_name | default('metallb-operator') }}"
    metallb_channel: "{{ (hcp.metallb | default({})).channel | default('stable') }}"
    metallb_source: "{{ (hcp.metallb | default({})).source | default('redhat-operators') }}"
    metallb_source_namespace: "{{ (hcp.metallb | default({})).source_namespace | default('openshift-marketplace') }}"
    metallb_instance_name: "{{ (hcp.metallb | default({})).instance_name | default('metallb') }}"
    metallb_address_pool_name: "{{ (hcp.metallb | default({})).address_pool_name | default('metallb') }}"
    metallb_l2adv_name: "{{ (hcp.metallb | default({})).l2advertisement_name | default('l2advertisement') }}"

- name: Validate MetalLB address pool input
  ansible.builtin.fail:
    msg: "Set hcp.metallb.ip_pool (string range or list of ranges), for example 172.23.232.141-172.23.232.142."
  when:
    - metallb_cfg.ip_pool is not defined or
      ((metallb_cfg.ip_pool is string and metallb_cfg.ip_pool | trim | length == 0) or
      (metallb_cfg.ip_pool is sequence and metallb_cfg.ip_pool is not string and metallb_cfg.ip_pool | length == 0))

- name: Normalize MetalLB IP pool addresses
  ansible.builtin.set_fact:
    metallb_addresses: "{{ metallb_cfg.ip_pool if (metallb_cfg.ip_pool is sequence and metallb_cfg.ip_pool is not string) else [metallb_cfg.ip_pool] }}"

- name: Ensure ansible work directory exists
  ansible.builtin.file:
    path: /root/ansible_workdir
    state: directory
    mode: '0755'

- name: Ensure MetalLB namespace exists
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ metallb_namespace }}"
    state: present

- name: Create OperatorGroup.yaml
  ansible.builtin.template:
    src: OperatorGroup.yaml.j2
    dest: /root/ansible_workdir/metallb-OperatorGroup.yaml
    mode: '0644'

- name: Deploy OperatorGroup
  ansible.builtin.command: oc apply -f /root/ansible_workdir/metallb-OperatorGroup.yaml

- name: Create Subscription.yaml
  ansible.builtin.template:
    src: Subscription.yaml.j2
    dest: /root/ansible_workdir/metallb-Subscription.yaml
    mode: '0644'

- name: Deploy Subscription for MetalLB
  ansible.builtin.command: oc apply -f /root/ansible_workdir/metallb-Subscription.yaml

- name: Wait for MetalLB operator CSV to be Succeeded
  ansible.builtin.shell: |
    set -o pipefail
    oc get csv -n {{ metallb_namespace }} -o jsonpath='{range .items[*]}{.metadata.name}{"|"}{.status.phase}{"\n"}{end}' | grep {{ metallb_operator_name }} | grep Succeeded | wc -l
  register: metallb_csv
  until: metallb_csv.stdout | int >= 1
  retries: 30
  delay: 10
  changed_when: false

- name: Create MetalLB CR yaml
  ansible.builtin.template:
    src: MetalLB.yaml.j2
    dest: /root/ansible_workdir/metallb-MetalLB.yaml
    mode: '0644'

- name: Deploy MetalLB CR
  ansible.builtin.command: oc apply -f /root/ansible_workdir/metallb-MetalLB.yaml

- name: Create IPAddressPool yaml
  ansible.builtin.template:
    src: IPAddressPool.yaml.j2
    dest: /root/ansible_workdir/metallb-IPAddressPool.yaml
    mode: '0644'

- name: Deploy IPAddressPool
  ansible.builtin.command: oc apply -f /root/ansible_workdir/metallb-IPAddressPool.yaml

- name: Create L2Advertisement yaml
  ansible.builtin.template:
    src: L2Advertisement.yaml.j2
    dest: /root/ansible_workdir/metallb-L2Advertisement.yaml
    mode: '0644'

- name: Deploy L2Advertisement
  ansible.builtin.command: oc apply -f /root/ansible_workdir/metallb-L2Advertisement.yaml
