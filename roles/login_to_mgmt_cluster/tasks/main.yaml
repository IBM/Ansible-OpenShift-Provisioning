---

- name: Check if oc command is available
  shell: which oc
  register: oc_check
  failed_when: false
  changed_when: false

- name: Fail if oc is not installed
  fail:
    msg: "oc CLI is not installed. Please install OpenShift CLI tools first."
  when: oc_check.rc != 0

- name: Ensure kube directory exists
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Login to Management Cluster
  ansible.builtin.command: >
    oc login {{ api_server }}
    -u {{ user_name }}
    -p {{ password }}
    --insecure-skip-tls-verify=true
    --kubeconfig=/root/.kube/config
  no_log: true
  register: login_result
  changed_when: false

- name: Set login facts for other roles
  ansible.builtin.set_fact:
    mgmt_cluster_logged_in: true
    mgmt_kubeconfig: "/root/.kube/config"
