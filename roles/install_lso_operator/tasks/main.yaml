---
- name: Check whether LSO subscription already exists
  ansible.builtin.command: oc get subscription local-storage-operator -n {{ hcp.lso.namespace | default('openshift-local-storage', true) }}
  register: lso_check
  changed_when: false
  failed_when: false

- name: Mark LSO present flag
  ansible.builtin.set_fact:
    lso_already_present: "{{ lso_check.rc == 0 }}"

- name: Skip LSO install when already present
  ansible.builtin.debug:
    msg: "LSO subscription already exists in {{ hcp.lso.namespace | default('openshift-local-storage', true) }}, skipping install_lso_operator role."
  when: lso_already_present

- name: Install and configure LSO
  when: not lso_already_present
  block:
    - name: Ensure ansible work directory exists
      ansible.builtin.file:
        path: /root/ansible_workdir
        state: directory
        mode: '0755'

    - name: Create CatalogSource.yaml from template
      ansible.builtin.template:
        src: CatalogSource.yaml.j2
        dest: /root/ansible_workdir/lso-CatalogSource.yaml
        mode: '0644'
      when: hcp.lso.catalogsource_image | default('', true) | length > 0

    - name: Deploy CatalogSource
      ansible.builtin.command: oc apply -f /root/ansible_workdir/lso-CatalogSource.yaml
      when: hcp.lso.catalogsource_image | default('', true) | length > 0

    - name: Ensure LSO namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ hcp.lso.namespace | default('openshift-local-storage', true) }}"
        state: present

    - name: Create OperatorGroup.yaml
      ansible.builtin.template:
        src: OperatorGroup.yaml.j2
        dest: /root/ansible_workdir/lso-OperatorGroup.yaml
        mode: '0644'

    - name: Deploy OperatorGroup
      ansible.builtin.command: oc apply -f /root/ansible_workdir/lso-OperatorGroup.yaml

    - name: Create Subscription.yaml
      ansible.builtin.template:
        src: Subscription.yaml.j2
        dest: /root/ansible_workdir/lso-Subscription.yaml
        mode: '0644'

    - name: Deploy Subscription for LSO
      ansible.builtin.command: oc apply -f /root/ansible_workdir/lso-Subscription.yaml

    - name: Wait for LSO operator CSV to be Succeeded
      ansible.builtin.shell: |
        set -o pipefail
        oc get csv -n {{ hcp.lso.namespace | default('openshift-local-storage', true) }} -o jsonpath='{range .items[*]}{.metadata.name}{"|"}{.status.phase}{"\n"}{end}' | grep local-storage-operator | grep Succeeded | wc -l
      register: lso_csv
      until: lso_csv.stdout | int >= 1
      retries: 30
      delay: 10
      changed_when: false

    - name: Create LocalVolumeDiscovery.yaml
      ansible.builtin.template:
        src: LocalVolumeDiscovery.yaml.j2
        dest: /root/ansible_workdir/lso-LocalVolumeDiscovery.yaml
        mode: '0644'

    - name: Deploy LocalVolumeDiscovery
      ansible.builtin.command: oc apply -f /root/ansible_workdir/lso-LocalVolumeDiscovery.yaml

    - name: Create LocalVolume.yaml
      ansible.builtin.template:
        src: LocalVolume.yaml.j2
        dest: /root/ansible_workdir/lso-LocalVolume.yaml
        mode: '0644'

    - name: Deploy LocalVolume
      ansible.builtin.command: oc apply -f /root/ansible_workdir/lso-LocalVolume.yaml

    - name: Label ODF storage nodes for LocalVolume selector
      ansible.builtin.command: >
        oc label node {{ item }}
        {{ hcp.lso.storage_node_label.key | default('cluster.ocs.openshift.io/openshift-storage', true) }}={{ hcp.lso.storage_node_label.value | default('', true) }}
        --overwrite
      loop: "{{ hcp.lso.storage_nodes | default([], true) }}"
      when: hcp.lso.storage_nodes | default([], true) | length > 0
