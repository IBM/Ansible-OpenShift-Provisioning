---
- name: Check whether OpenShift Virtualization HyperConverged already exists
  ansible.builtin.command: oc get hyperconverged {{ hcp.ocpvirt.instance_name | default('kubevirt-hyperconverged', true) }} -n {{ hcp.ocpvirt.namespace | default('openshift-cnv', true) }}
  register: ocpvirt_check
  changed_when: false
  failed_when: false

- name: Mark OpenShift Virtualization present flag
  ansible.builtin.set_fact:
    ocpvirt_already_present: "{{ ocpvirt_check.rc == 0 }}"

- name: Skip OpenShift Virtualization install when already present
  ansible.builtin.debug:
    msg: "HyperConverged {{ hcp.ocpvirt.instance_name | default('kubevirt-hyperconverged', true) }} already exists, skipping install_ocpvirt_operator role."
  when: ocpvirt_already_present

- name: Install and configure OpenShift Virtualization
  when: not ocpvirt_already_present
  block:
    - name: Ensure ansible work directory exists
      ansible.builtin.file:
        path: /root/ansible_workdir
        state: directory
        mode: '0755'

    - name: Create CatalogSource.yaml from template
      ansible.builtin.template:
        src: CatalogSource.yaml.j2
        dest: /root/ansible_workdir/ocpvirt-CatalogSource.yaml
        mode: '0644'
      when: hcp.ocpvirt.catalogsource_image | default('', true) | length > 0

    - name: Deploy CatalogSource
      ansible.builtin.command: oc apply -f /root/ansible_workdir/ocpvirt-CatalogSource.yaml
      when: hcp.ocpvirt.catalogsource_image | default('', true) | length > 0

    - name: Ensure OpenShift Virtualization namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ hcp.ocpvirt.namespace | default('openshift-cnv', true) }}"
        state: present

    - name: Create OperatorGroup.yaml
      ansible.builtin.template:
        src: OperatorGroup.yaml.j2
        dest: /root/ansible_workdir/ocpvirt-OperatorGroup.yaml
        mode: '0644'

    - name: Deploy OperatorGroup
      ansible.builtin.command: oc apply -f /root/ansible_workdir/ocpvirt-OperatorGroup.yaml

    - name: Create Subscription.yaml
      ansible.builtin.template:
        src: Subscription.yaml.j2
        dest: /root/ansible_workdir/ocpvirt-Subscription.yaml
        mode: '0644'

    - name: Deploy Subscription for OpenShift Virtualization
      ansible.builtin.command: oc apply -f /root/ansible_workdir/ocpvirt-Subscription.yaml

    - name: Wait for OpenShift Virtualization operator CSV to be Succeeded
      ansible.builtin.shell: |
        set -o pipefail
        oc get csv -n {{ hcp.ocpvirt.namespace | default('openshift-cnv', true) }} -o jsonpath='{range .items[*]}{.metadata.name}{"|"}{.status.phase}{"\n"}{end}' | grep kubevirt-hyperconverged | grep Succeeded | wc -l
      register: ocpvirt_csv
      until: ocpvirt_csv.stdout | int >= 1
      retries: 30
      delay: 10
      changed_when: false

    - name: Create HyperConverged.yaml
      ansible.builtin.template:
        src: HyperConverged.yaml.j2
        dest: /root/ansible_workdir/ocpvirt-HyperConverged.yaml
        mode: '0644'

    - name: Deploy HyperConverged CR
      ansible.builtin.command: oc apply -f /root/ansible_workdir/ocpvirt-HyperConverged.yaml
