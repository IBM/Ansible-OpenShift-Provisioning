---    
    - name: Wait for console operator to be available
      ansible.builtin.shell: |
        oc --kubeconfig {{ hcp_kubeconfig }} get co console -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || echo "False"
      register: console_status
      retries: 60
      delay: 30
      until: console_status.stdout == "True"
      ignore_errors: true

    - name: Wait for ingress operator to be available
      ansible.builtin.shell: |
        oc --kubeconfig {{ hcp_kubeconfig }} get co ingress -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || echo "False"
      register: ingress_status
      retries: 60
      delay: 30
      until: ingress_status.stdout == "True"
      ignore_errors: true

    - name: Get console route URL
      ansible.builtin.shell: |
        oc --kubeconfig {{ hcp_kubeconfig }} get route console -n openshift-console -o jsonpath='{.spec.host}' 2>/dev/null || echo "Not available yet"
      register: console_url
      ignore_errors: true

    - name: Wait until all cluster operators are Available
      ansible.builtin.shell: |
        oc --kubeconfig {{ hcp_kubeconfig }} get co --no-headers | \
        awk '$3 != "True" || $5 != "False" {exit 1}'
      register: hcp_cluster_operators
      changed_when: false
      retries: 40
      delay: 30
      until: hcp_cluster_operators.rc == 0

    - name: Get HCP nodes
      ansible.builtin.command:
        cmd: oc --kubeconfig {{ hcp_kubeconfig }} get nodes
      register: hcp_nodes
      changed_when: false

    - name: Display HCP nodes
      debug:
        var: hcp_nodes.stdout_lines

    - name: Wait for Hosted Control Plane to Complete
      ansible.builtin.shell: |
        oc get hc -n {{ hcp.control_plane.clusters_namespace }} --no-headers | awk  '{print $4}'
      register: hc_status
      until: hc_status.stdout == "Completed"
      retries: 40
      delay: 15

    - name: Get Password for Hosted Cluster
      ansible.builtin.shell: |
        oc get secret kubeadmin-password -n "{{ hcp.control_plane.clusters_namespace }}-{{ hcp.control_plane.hosted_cluster_name }}" -o yaml | grep -i 'password:'
      register: cluster_password_encoded

    - name: Decode the Password
      ansible.builtin.shell: | 
        echo "{{cluster_password_encoded.stdout_lines[0].split(' ')[-1]}}" | base64 --decode
      register: cluster_password_decoded

    - name: Saving the password in bastion 
      copy:
        content: "{{ cluster_password_decoded.stdout_lines[0] }}"
        dest: /root/ansible_workdir/kubeadmin-password

    - name: Get api server of Hosted Cluster
      ansible.builtin.shell: |
        grep -i 'server:' {{ hcp_kubeconfig }}
      register: api_server

    - name: Display cluster access information
      debug:
         msg:
         - "=========================================="
         - "Hosted Cluster Created Successfully!"
         - "=========================================="
         - "Cluster Name: {{ hcp.control_plane.hosted_cluster_name }}"
         - "Namespace: {{ hcp.control_plane.clusters_namespace }}"
         - "Control Plane Namespace: {{ hosted_control_plane_namespace }}"
         - "Kubeconfig Location: {{ hcp_kubeconfig }}"
         - "LoadBalancer IP: {{ lb_external_ip.stdout }}"
         - "Login credentials: https://{{ console_url.stdout }} | Username : 'kubeadmin' Password : {{ cluster_password_decoded.stdout_lines[0] }} "
         - "oc login command for CLI: oc login {{ api_server.stdout_lines[0].split(': ')[-1] }} -u kubeadmin -p {{ cluster_password_decoded.stdout_lines[0] }} "
         - "=========================================="
