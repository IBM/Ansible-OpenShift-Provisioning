---
# Playbook for setting up HCP KubeVirt in disconnected environment
# This playbook applies IDMS, ITMS, CatalogSources and installs operators

# Dynamically Add Bastion Host
- name: Add Bastion Host to Inventory
  hosts: localhost
  vars_files:
    - "{{ playbook_dir }}/../inventories/default/group_vars/secrets.yaml"
    - "{{ playbook_dir }}/../inventories/default/group_vars/hcp-kubevirt.yaml"
    - "{{ playbook_dir }}/../inventories/default/group_vars/disconnected.yaml"
  tasks:
    - name: Add bastion dynamically
      ansible.builtin.add_host:
        name: "{{ hcp.mgmt_cluster_bastion.ip }}"
        groups: mgmt_bastion
        ansible_user: root
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') + '/.ssh/' + (hcp.ansible_key_name | default('ansible-ocpz', true)) }}"
        ansible_connection: ssh
        inventory_dir: "{{ playbook_dir }}/../inventories/default"

# Login to OCP Management Cluster (from bastion)
- name: Login to OCP Management Cluster
  hosts: mgmt_bastion
  vars_files:
    - "{{ playbook_dir }}/../inventories/default/group_vars/secrets.yaml"
    - "{{ playbook_dir }}/../inventories/default/group_vars/hcp-kubevirt.yaml"
    - "{{ playbook_dir }}/../inventories/default/group_vars/disconnected.yaml"
  vars:
    vault_api_server: "{{ hcp.oc_url }}"
    vault_user_name: "{{ vault_ocp_user }}"
    vault_password: "{{ vault_ocp_password }}"
  roles:
    - login_to_mgmt_cluster

# Apply Disconnected Manifests (IDMS, ITMS, CatalogSource)
- name: Apply Disconnected Manifests for HCP
  hosts: mgmt_bastion
  vars_files:
    - "{{ playbook_dir }}/../inventories/default/group_vars/secrets.yaml"
    - "{{ playbook_dir }}/../inventories/default/group_vars/hcp-kubevirt.yaml"
    - "{{ playbook_dir }}/../inventories/default/group_vars/disconnected.yaml"
  become: true
  gather_facts: false
  roles:
    - disconnected_apply_hcp_manifests
