---
# Login to OCP Management Cluster
- name: Login to OCP Management Cluster
  hosts: localhost
  vars_files:
    - "{{playbook_dir}}/secrets.yaml"
    - "{{playbook_dir}}/../inventories/default/group_vars/hcp-kubevirt.yaml"
  roles:
    - login_to_mgmt_cluster
  vars:
    api_server: "{{ api_server }}"
    user_name: "{{ user_name }}"
    password: "{{ password }}"
    context_name: "mgmt-cluster"
    kubeconfig_path: "/root/shwe-lpar-hub-roce/auth/kubeconfig"

# Ensure Python Dependencies on localhost
- name: Install required Python packages on localhost
  hosts: localhost
  become: false
  gather_facts: yes
  tasks:
    - name: Ensure kubernetes and openshift Python libs are installed
      pip:
        name:
          - kubernetes
          - openshift
        state: present
        virtualenv: "{{ ansible_env.HOME }}/.ansible-venvs/hcp-kubevirt-prereqs"
        virtualenv_command: "{{ ansible_playbook_python }} -m venv"

# Check Node Resources
- name: Check OCP Node Resource Usage
  hosts: localhost
  vars_files:
    - "{{playbook_dir}}/secrets.yaml"
    - "{{playbook_dir}}/../inventories/default/group_vars/hcp-kubevirt.yaml"
  vars:
    resource_threshold: 75
    debug_mode: true
  roles:
    - check_node_resources

# Dynamically Add Bastion Host
- name: Add Bastion Host to Inventory
  hosts: localhost
  vars_files:
    - "{{playbook_dir}}/secrets.yaml"
    - "{{playbook_dir}}/../inventories/default/group_vars/hcp-kubevirt.yaml"
  tasks:
    - name: Add bastion dynamically
      add_host:
        name: "{{ hcp.mgmt_cluster_bastion.ip }}"
        groups: mgmt_bastion
        ansible_user: "{{ hcp.mgmt_cluster_bastion.user }}"
        ansible_password: "{{ bastion_root_pw }}"
        ansible_ssh_pass: "{{ bastion_root_pw }}"
        ansible_connection: ssh

# Ensure Python Dependencies on mgmt_bastion
- name: Install required Python packages on mgmt_bastion
  hosts: mgmt_bastion
  become: true
  gather_facts: yes
  vars_files:
    - "{{playbook_dir}}/secrets.yaml"
    - "{{playbook_dir}}/../inventories/default/group_vars/hcp-kubevirt.yaml"
  tasks:
    - name: Ensure pip is installed
      package:
        name: python3-pip
        state: present
      become: true

    - name: Install kubernetes and openshift Python packages
      pip:
        name:
          - kubernetes
          - openshift
        state: present

# Install Operators on Mgmt Cluster Bastion
- name: Install Operators on the management cluster
  hosts: mgmt_bastion
  vars_files:
    - "{{playbook_dir}}/secrets.yaml"
    - "{{playbook_dir}}/../inventories/default/group_vars/hcp-kubevirt.yaml"
  become: true
  gather_facts: no
  pre_tasks:
    - name: Ensure ansible work directory exists
      ansible.builtin.file:
        path: /root/ansible_workdir
        state: directory
        mode: '0755'

    - name: Ensure root kube directory exists
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Login to management cluster from bastion
      ansible.builtin.command: >
        oc login {{ hcp.oc_url }}
        -u {{ user_name }}
        -p {{ password }}
        --insecure-skip-tls-verify=true
        --kubeconfig=/root/.kube/config
      no_log: true

  roles:
    - install_mce_operator_kubevirt
    - install_metallb_operator
    - install_ocpvirt_operator
    - install_lso_operator
    - install_odf_operator
    
