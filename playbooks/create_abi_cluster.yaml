---
# ABI Installation Proccess.
- name: ABI Installation Proccess
  hosts: bastion
  become: false
  vars_files:
    - "{{ inventory_dir }}/group_vars/all.yaml"
    - "{{ inventory_dir }}/group_vars/secrets.yaml"
    - "{{ inventory_dir }}/group_vars/zvm.yaml"
    - "{{ inventory_dir }}/group_vars/disconnected.yaml"
  roles:
    - common  # Common Variable the will be used by all the inwalked roles.
    - role: offline_artifacts
      when: disconnected.enabled  # Update CA Certificates & Download OCP Packages
    - role: download_ocp_installer
      when: not disconnected.enabled  # Download Openshift Installer.
    - prepare_configs  # Prepare AgentConfig & InstallConfig.
    - create_agent  # Create Agents || Build initrd.img, rootfs.img & kernelfs.img.

- name: Start z/VM Nodes
  hosts: bastion
  become: false
  vars_files:
    - "{{ inventory_dir }}/group_vars/zvm.yaml"
  tasks:
    - name: Support for z/VM
      when: installation_type | lower == 'zvm'
      block:
        - name: Setup Param File
          ansible.builtin.include_role:
            name: setup_params

        - name: Boot z/VM Guests
          ansible.builtin.include_tasks: ../roles/boot_zvm_nodes/tasks/main.yaml
          loop: "{{ range(zvm.nodes | length) | list }}"

# Boot ABI KVM Agents.
- name: Boot ABI Agents
  hosts: kvm_host[0]
  become: false
  vars_files:
    - "{{ inventory_dir }}/group_vars/all.yaml"
    - "{{ inventory_dir }}/group_vars/secrets.yaml"
  roles:
    - common
    - role: boot_abi_agents
      when: installation_type | lower == 'kvm'

# Boot ABI LPAR Agents.
- name: Boot ABI LPAR Agents
  hosts: bastion
  become: false
  vars_files:
    - "{{ inventory_dir }}/group_vars/all.yaml"
    - "{{ inventory_dir }}/group_vars/secrets.yaml"
  tasks:
    - name: Support for LPAR ABI
      when: installation_type | lower == 'lpar' and abi.flag is defined and abi.flag is true
      block:
        - name: Install tessia-baselib on bastion
          ansible.builtin.include_role:
            name: install_tessia_baselib

        - name: Boot LPAR nodes with ABI agent
          ansible.builtin.include_role:
            name: boot_LPAR
          loop: "{{ env.cluster.nodes.control.vm_name }}"
          loop_control:
            loop_var: item

- name: Setup SSH agent
  tags: ssh_to_nodes
  hosts: bastion
  roles:
    - ssh_agent
