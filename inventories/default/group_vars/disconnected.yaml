# Warning: currently, the oc-mirror plugin is officially downloadable to amd64 only.
# Please refer to docs set-variables-group-vars.md for instructions on how to create this configuration file for disconnected.
disconnected:
  enabled: true
  registry:
    url: 'registry url'  # Will be auto-set to bastion IP:port if using bastion registry
    ip: 'registry reachable ip'  # Will be auto-set to bastion IP if using bastion registry
    pull_secret: ''
    ca_trusted: true
    ca_cert: |
      -----BEGIN CERTIFICATE-----
      if ca_trusted is False, then this ca will be added to mirror host anchors
      as well as to the install config of cluster
      -----END CERTIFICATE-----
    # Configuration for container registry on bastion (if no external registry available)
    bastion:
      enabled: true  # Set to true to create registry on bastion
      port: 5000  # Registry port
      username: 'admin'  # Registry username
      password: "{{ vault_registry_password }}"  # Registry password from secrets.yaml
      email: 'registry@example.com'  # Email for registry authentication in pull secret
      data_dir: '/opt/registry/data'  # Registry data storage
      auth_dir: '/opt/registry/auth'  # Registry authentication files
      certs_dir: '/opt/registry/certs'  # Registry certificates
      # Package installation configuration
      use_local_repo: true  # Set to false to install from downloaded RPMs
      rpm_dir: '/tmp/registry-rpms'  # Directory for downloaded RPMs (if use_local_repo=false)
      rpm_path: 'rpms/registry'  # Path on file server for RPMs (if use_local_repo=false)
      required_rpms:  # List of RPM files to download (if use_local_repo=false)
        - 'podman-*.rpm'
        - 'httpd-tools-*.rpm'
        - 'openssl-*.rpm'
        # Add all dependency RPMs as needed
  mirroring:
    # this is the host that can access the internet as well as the registry
    host:
      name: hosname
      ip: x.x.x.x
      user: mirroruser # with become access
      pass: mirrorpassword
    # In disconnected mode client binaries and RHCOS will be placed on the
    # file server (env.file_server) and then downloaded to the final
    # destination from there. Currently only oc-mirror is handled this way.
    file_server:
      clients_dir: 'clients'
      oc_mirror_tgz: 'oc-mirror.tar.gz'
      download_dir: '/tmp/oc-mirror-downloads'  # Directory on file server to download files before distribution
    # Configuration for bastion host where oc-mirror will run
    bastion:
      working_dir: '/opt/oc-mirror'  # Working directory for oc-mirror operations on bastion
      mirror_output_dir: '/opt/oc-mirror/mirror-output'  # Directory to store mirroring results and manifests
    # Download URLs for oc-mirror plugin and OCP client tools
    oc_mirror_download:
      base_url: "https://mirror.openshift.com/pub/openshift-v4/s390x/clients/ocp/stable/"  # Base URL for oc-mirror download
      oc_mirror_tgz: 'oc-mirror.tar.gz'  # oc-mirror plugin archive name
    # this will download oc binary to the mirror host for use on the mirror host for mirroring
    client_download:
      ocp_download_url: "https://mirror.openshift.com/pub/openshift-v4/multi/clients/ocp/stable-4.21/s390x/"
      ocp_client_tgz: 'openshift-client-linux.tar.gz'
    legacy:
      platform: false
      ocp_quay_release_image_tag: '4.21.14-s390x'
      ocp_org: 'ocp4'
      ocp_repo: 'openshift4'
      ocp_tag: 'v4.21.14' # platform images will be pushed to {registry_url}/{ocp_org}/{ocp_repo}:{ocp_tag}
    oc_mirror:
      oc_mirror_args:
        continue_on_error: false
        source_skip_tls: false
      post_mirror:
        mapping:
          replace:
            enabled: false
            list:
              - regexp: what
                replace: with
      release_image_tag: '4.14.14-multi'
      release_image_registry: 'brew.registry.redhat.io'
      image_set:
      # this field is a standard image set from oc-mirror documentation.
      # The only exception is the storageConfig which is altered to allow substitution of disconnected.registry.url
        apiVersion: mirror.openshift.io/v2alpha1 # update the version with v2alpha1 for oc-mirror v2 plugin and v1alpha2 for v1 plugin
        storageConfig:
          enable: false # enable this flag if oc-mirror v1 plugin is used since storageConfig is removed for v2 plugin
          registry:
            enabled: true # use registry storage backend. Currently only method supported
            imageURL: # the final value will be {imageURL: disconnected.registry.url/org/repo}
              org: mirror
              repo: oc-mirror-metadata
            skipTLS: false # standard field form oc-mirror schema
        mirror: # this field is also standard from the oc-mirror schema. It will be substituted as is into the final image set.
          platform:
            architectures:
              - multi
              # Note: cannot mirror tags like multi-s390x; list must contain pure
              # architecture names (e.g. s390x) or the multiarch token 'multi'.
            channels:
              - name: stable-4.21
                full: false
                minVersion: 4.21.14
                maxVersion: 4.21.14
          operators:
            - catalog: registry.redhat.io/redhat/redhat-operator-index:v4.13
              full: false
              packages:
                - name: serverless-operator
                  channels:
                    - name: stable
                      # minVersion: '2.4.1-0'
                      # maxVersion: '2.4.1-0'
          additionalImages:
            - name: registry.redhat.io/ubi8/ubi:latest
          helm: {}
